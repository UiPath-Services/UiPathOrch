<!DOCTYPE html>
<html lang='fr'>
<head>
    <meta charset='UTF-8'>
    <title>UiPathOrch</title>
    <style>
        :root {{
            --bg: #e9ecf0;
            --card: #ffffff;
            --ink: #1f2328;
            --muted: #57606a;
            --soft: #8b95a1;
            --accent: #fa4616;
            --rule: #e1e4e8;
            --chip: #f5f6f8;
        }}

        * {{ box-sizing: border-box; }}
        html, body {{ margin: 0; padding: 0; }}

        body {{
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: var(--ink);
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }}

        .card {{
            position: relative;
            background: var(--card);
            border: 1px solid var(--rule);
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(20, 30, 50, 0.06);
            display: grid;
            grid-template-columns: auto 1fr;
            column-gap: 18px;
            padding: 18px 22px 14px 22px;
            min-width: 440px;
            max-width: 95vw;
            overflow: hidden;
        }}

        .card::before {{
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent);
        }}

        .bot {{
            max-height: 80px;
            width: auto;
            align-self: start;
            margin: -4px 0 0 -14px;
        }}

        .title {{
            font-size: 17px;
            font-weight: 600;
            margin: 0 0 6px 0;
            letter-spacing: -0.2px;
        }}

        .tenant {{
            display: inline-block;
            font-size: 13px;
            white-space: nowrap;
            margin-bottom: 8px;
        }}

        .row {{
            font-size: 13px;
            color: var(--muted);
            margin: 4px 0 0 0;
        }}

        .row strong {{
            color: var(--ink);
            font-weight: 600;
        }}

        .footer {{
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid var(--rule);
            font-size: 12px;
            color: var(--soft);
        }}

        .footer a {{
            color: var(--soft);
            text-decoration: none;
        }}

        .footer a:hover {{
            color: var(--muted);
            text-decoration: underline;
        }}
    </style>
</head>
<body>
    <div class="card">
        <img class="bot" src="data:image/png;base64,{3}" alt="" />
        <div class="content">
            <h1 class="title">Connexion réussie</h1>
            <a class="tenant" href="{0}" target="_blank" rel="noopener noreferrer">{0}</a>
            <p class="row">Monté en tant que <strong>{1}</strong></p>
            <p class="row" style="{4}">Connecté en tant que <strong>{5}</strong></p>
        </div>
        <div class="footer">
            <span>
                <a href="https://github.com/UiPath-Services/UiPathOrch#readme" target="_blank" rel="noopener noreferrer">Aide ?</a>
                · <a href="https://github.com/UiPath-Services/UiPathOrch/issues" target="_blank" rel="noopener noreferrer">Signaler un bug</a>
                · <a href="https://github.com/UiPath-Services/UiPathOrch/discussions" target="_blank" rel="noopener noreferrer">Poser une question</a>
            </span>
            <a href="https://www.powershellgallery.com/packages/UiPathOrch/{2}" target="_blank" rel="noopener noreferrer">UiPathOrch {2}</a>
        </div>
    </div>
</body>
</html>
