version: 2
updates:
  # GitHub Actions used by ci.yml / release.yml / codeql.yml (checkout, setup-dotnet, codeql-action, ...).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # NuGet packages across the solution (UiPathOrch.sln -> UiPathOrch.csproj + Tests/UnitTests).
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    groups:
      nuget-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # Fully pinned to the declared support floor (manifest PowerShellVersion = 7.4.2).
      # This is a 3-knob lockstep that must move together and only on purpose:
      #   - UiPathOrch.csproj        System.Management.Automation  (what the module compiles against)
      #   - UiPathOrch.psd1          PowerShellVersion             (the minimum we claim to support)
      #   - Tests/UnitTests.csproj   Microsoft.PowerShell.SDK      (the in-process runspace the tests use)
      # SMA is host-provided (never shipped), so a patch bump delivers no runtime/CVE benefit — those
      # fixes come from the user's PowerShell host, not from our compile reference. Pinning all three
      # keeps declared == tested == shipped at one version, with zero drift and no patch-chasing
      # treadmill. Raise the floor deliberately (bump all three by hand, then loosen this) when we
      # decide to drop support for an older PowerShell. A delisted/yanked package surfaces as a CI
      # `dotnet restore` failure, which is the signal to bump reactively — not a routine Dependabot PR.
      - dependency-name: "Microsoft.PowerShell.SDK"
      - dependency-name: "System.Management.Automation"
