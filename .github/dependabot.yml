version: 2
updates:
  # GitHub Actions used by ci.yml / release.yml / codeql.yml (checkout, setup-dotnet, codeql-action, ...).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # NuGet packages across the solution (UiPathOrch.sln -> UiPathOrch.csproj + Tests/UnitTests).
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    groups:
      nuget-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
