name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    # Pinned (not windows-latest) for reproducibility: windows-latest is being
    # redirected to a newer image, which can shift the preinstalled .NET set and
    # destabilize tooling discovery (see the Check formatting retry below).
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore --source https://api.nuget.org/v3/index.json --ignore-failed-sources

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Check formatting
        shell: pwsh
        run: |
          # `dotnet format` intermittently dies at startup with
          # "Unable to locate dotnet CLI" when multiple .NET installs are present
          # on the runner (setup-dotnet's SDK + the image's preinstalled
          # runtime). That's a transient infra flake, not a formatting violation,
          # so retry a few times. A GENUINE formatting failure still fails after
          # all attempts (the loop only short-circuits on exit code 0), so the
          # gate is preserved -- a real violation just takes a bit longer to
          # report.
          $max = 3
          for ($i = 1; $i -le $max; $i++) {
            dotnet format --verify-no-changes --verbosity diagnostic
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($i -lt $max) {
              Write-Host "::warning::dotnet format attempt $i/$max failed (exit $LASTEXITCODE); retrying in 10s..."
              Start-Sleep -Seconds 10
            }
          }
          Write-Host "::error::dotnet format failed after $max attempts."
          exit 1

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Verify cmdlet inventory (manifest drift)
        shell: pwsh
        # Reflects over the built DLL and reconciles the registrable cmdlets
        # (public + concrete + [Cmdlet]) against the manifest's CmdletsToExport.
        # Fails if a cmdlet was added/removed without updating the manifest.
        run: ./Tests/Get-CmdletInventory.ps1 -DllPath ./UiPathOrch/bin/Release/net8.0/UiPathOrch.dll -FailOnDrift

  # Build + unit-test on Linux and macOS so the "Windows | Linux | macOS" claim is
  # exercised by CI and cross-platform regressions (path handling, browser launch,
  # CSV encoding) are caught. Formatting is verified by the Windows job only.
  crossplat:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore --source https://api.nuget.org/v3/index.json --ignore-failed-sources

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
