name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $v = $tag.TrimStart('v')
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: dotnet restore --source https://api.nuget.org/v3/index.json --ignore-failed-sources

      - name: Build
        run: dotnet build UiPathOrch/UiPathOrch.csproj --no-restore --configuration Release

      - name: Verify manifest and csproj match tag
        shell: pwsh
        run: |
          $expected = '${{ steps.ver.outputs.version }}'

          $data = Import-PowerShellDataFile Staging/UiPathOrch.psd1
          if ($data.ModuleVersion -ne $expected) {
            throw "Manifest ModuleVersion $($data.ModuleVersion) does not match tag v$expected"
          }

          # csproj <Version> is what gets stamped into UiPathOrch.dll's AssemblyVersion /
          # FileVersion / InformationalVersion. It must match too, otherwise the DLL ships
          # with a stale internal version (0.9.16.6 / 0.9.17.0 had this drift).
          $csproj = [xml](Get-Content UiPathOrch/UiPathOrch.csproj -Raw)
          $csprojVersion = $csproj.Project.PropertyGroup.Version
          if ($csprojVersion -ne $expected) {
            throw "csproj Version $csprojVersion does not match tag v$expected"
          }

      - name: Assemble module directory
        id: stage
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP 'UiPathOrch'
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $stage 'Functions') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $stage 'Docs') -Force | Out-Null

          Copy-Item 'UiPathOrch/bin/Release/net8.0/UiPathOrch.dll' $stage
          foreach ($f in 'UiPathOrch.psd1','UiPathOrch.psm1','UiPathOrch.Format.ps1xml','ReleaseNotes.md') {
            Copy-Item (Join-Path 'Staging' $f) $stage
          }
          Get-ChildItem 'Staging/Functions/*.ps1' | Copy-Item -Destination (Join-Path $stage 'Functions')
          Get-ChildItem 'Staging/Docs/*.md'       | Copy-Item -Destination (Join-Path $stage 'Docs')

          "stage=$stage" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Probe signing secret
        id: sign_probe
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.CODE_SIGNING_PFX_BASE64 }}
        run: |
          $present = -not [string]::IsNullOrEmpty($env:PFX_B64)
          "present=$($present.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Sign module
        if: steps.sign_probe.outputs.present == 'true'
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.CODE_SIGNING_PFX_BASE64 }}
          PFX_PW:  ${{ secrets.CODE_SIGNING_PFX_PASSWORD }}
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:PFX_B64))
          $pw = ConvertTo-SecureString $env:PFX_PW -AsPlainText -Force
          $cert = Get-PfxCertificate -FilePath $pfx -Password $pw
          $stage = '${{ steps.stage.outputs.stage }}'
          # Sign ONLY the native binary. Script files (.psd1 / .psm1 / .ps1xml /
          # Functions/*.ps1) are left unsigned on purpose: Install-Module verifies
          # Authenticode signatures on script files but not on .dll, so a self-
          # signed script signature fails on any end-user PC where the cert is
          # not pre-trusted. WDAC / AppLocker only gate native binaries anyway.
          $files = @("$stage/UiPathOrch.dll")
          Set-AuthenticodeSignature -FilePath $files -Certificate $cert `
              -TimestampServer http://timestamp.digicert.com
          # Self-signed certs yield Status=UnknownError on machines where the cert is
          # not in the trust store (runners don't trust it). That's expected — the
          # signature itself is correct, only chain validation needs the cert installed
          # on the end-user machine. Verify thumbprint matches + reject tamper / missing.
          $expected = $cert.Thumbprint
          $bad = Get-AuthenticodeSignature $files | Where-Object {
            $_.SignerCertificate.Thumbprint -ne $expected -or
            $_.Status -notin @('Valid','UnknownError')
          }
          if ($bad) {
            $bad | Format-Table Status, StatusMessage, Path
            throw 'One or more signatures are missing, tampered, or signed by the wrong cert.'
          }

      - name: Publish to PSGallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Publish-Module -Path '${{ steps.stage.outputs.stage }}' -NuGetApiKey $env:PSGALLERY_API_KEY -Verbose

      - name: Extract release notes for this version
        id: notes
        shell: pwsh
        run: |
          $version = '${{ steps.ver.outputs.version }}'
          $lines = Get-Content Staging/ReleaseNotes.md
          $inSection = $false
          $section = New-Object System.Collections.Generic.List[string]
          foreach ($line in $lines) {
            if ($line -match '^# Version:\s*(\S+)') {
              if ($matches[1] -eq $version) { $inSection = $true; continue }
              elseif ($inSection)            { break }
            }
            if ($inSection) { $section.Add($line) }
          }
          $body = ($section -join "`n").Trim()
          if ([string]::IsNullOrWhiteSpace($body)) {
            throw "No release notes section found for version $version in Staging/ReleaseNotes.md"
          }
          $notesPath = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          Set-Content -Path $notesPath -Value $body -Encoding UTF8
          "notes_path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.ver.outputs.tag }}" --title "${{ steps.ver.outputs.tag }}" --notes-file "${{ steps.notes.outputs.notes_path }}"
