name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    # Pinned to match ci.yml (not windows-latest): windows-latest is being
    # redirected to a newer image that shifts the preinstalled .NET set and
    # destabilizes tooling discovery (see the Check formatting retry below).
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $v = $tag.TrimStart('v')
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: dotnet restore --source https://api.nuget.org/v3/index.json --ignore-failed-sources

      - name: Build
        # Build the whole solution (not just the main csproj) so the test
        # projects are compiled and the format / test steps below can run
        # with --no-build. The release artifact is still UiPathOrch.dll only;
        # the extra ~10 s for test-project compilation is the price of
        # running the same gates as CI before publish.
        run: dotnet build --no-restore --configuration Release

      - name: Check formatting (same gate as CI)
        # Run the same dotnet format gate as ci.yml. Without this step a
        # tag push to a master with stale formatting would publish to
        # PSGallery before CI even reports failure (the two workflows race
        # and Release usually wins). Use the same retry loop as ci.yml so the
        # transient "Unable to locate dotnet CLI" infra flake doesn't abort a
        # release; a GENUINE formatting failure still fails after all attempts.
        shell: pwsh
        run: |
          $max = 3
          for ($i = 1; $i -le $max; $i++) {
            dotnet format --verify-no-changes --verbosity diagnostic
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($i -lt $max) {
              Write-Host "::warning::dotnet format attempt $i/$max failed (exit $LASTEXITCODE); retrying in 10s..."
              Start-Sleep -Seconds 10
            }
          }
          Write-Host "::error::dotnet format failed after $max attempts."
          exit 1

      - name: Test (same gate as CI)
        # Same rationale: tests must pass before Publish-Module. Catches
        # regressions in shape/integration coverage that the version bump
        # commit might have introduced.
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Verify manifest and csproj match tag
        shell: pwsh
        run: |
          $expected = '${{ steps.ver.outputs.version }}'

          # Split the tag's SemVer 2.0 string into base (MAJOR.MINOR.PATCH) and optional
          # prerelease (e.g. "rc1"). PowerShell module manifests store these in two
          # separate fields — ModuleVersion holds only the numeric base, and the
          # PrivateData.PSData.Prerelease field holds the prerelease label.
          if ($expected -notmatch '^(\d+\.\d+\.\d+)(?:-(.+))?$') {
            throw "Tag v$expected is not in MAJOR.MINOR.PATCH[-PRERELEASE] form"
          }
          $expectedBase       = $matches[1]
          $expectedPrerelease = if ($matches[2]) { $matches[2] } else { '' }

          $data = Import-PowerShellDataFile Staging/UiPathOrch.psd1
          if ($data.ModuleVersion -ne $expectedBase) {
            throw "Manifest ModuleVersion $($data.ModuleVersion) does not match tag base $expectedBase (from v$expected)"
          }
          $actualPrerelease = if ($data.PrivateData.PSData.Prerelease) { $data.PrivateData.PSData.Prerelease } else { '' }
          if ($actualPrerelease -ne $expectedPrerelease) {
            throw "Manifest Prerelease '$actualPrerelease' does not match tag prerelease '$expectedPrerelease' (from v$expected)"
          }

          # csproj <Version> is what gets stamped into UiPathOrch.dll's AssemblyVersion /
          # FileVersion / InformationalVersion. It must match the FULL tag string
          # (including any -prerelease suffix), otherwise the DLL ships with a stale
          # internal version (0.9.16.6 / 0.9.17.0 had this drift).
          $csproj = [xml](Get-Content UiPathOrch/UiPathOrch.csproj -Raw)
          $csprojVersion = $csproj.Project.PropertyGroup.Version
          if ($csprojVersion -ne $expected) {
            throw "csproj Version $csprojVersion does not match tag v$expected"
          }

      - name: Build PlatyPS help (MAML)
        # Generate Staging/en-US/UiPathOrch.dll-Help.xml and UiPathOrch-help.xml from
        # the PlatyPS v1 markdown sources. These XML files are .gitignored (regenerated
        # per release) and are required for Get-Help in PSGallery-installed module to
        # show synopses, descriptions, and examples — without this step the published
        # module ships with bare auto-generated stubs only.
        shell: pwsh
        run: |
          Install-Module Microsoft.PowerShell.PlatyPS -RequiredVersion 1.0.1 -Scope CurrentUser -Force -AllowClobber
          ./PlatyPS/Build-Help.ps1 -SkipDeploy

      - name: Assemble module directory
        id: stage
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP 'UiPathOrch'
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $stage 'Functions') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $stage 'Docs')      -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $stage 'Examples')  -Force | Out-Null
          $enUS = Join-Path $stage 'en-US'
          New-Item -ItemType Directory -Path $enUS -Force | Out-Null

          Copy-Item 'UiPathOrch/bin/Release/net8.0/UiPathOrch.dll' $stage
          foreach ($f in 'UiPathOrch.psd1','UiPathOrch.psm1','UiPathOrch.Format.ps1xml') {
            Copy-Item (Join-Path 'Staging' $f) $stage
          }
          Get-ChildItem 'Staging/Functions/*.ps1' | Copy-Item -Destination (Join-Path $stage 'Functions')
          Get-ChildItem 'docs/??-*.md'            | Copy-Item -Destination (Join-Path $stage 'Docs')
          Get-ChildItem 'Staging/Examples/*.ps1'  | Copy-Item -Destination (Join-Path $stage 'Examples')

          # Mirror Build-Help.ps1's Step 4 (deploy) verbatim — iterate every XML file
          # actually generated rather than hardcoding names, so case (Help.xml vs
          # help.xml) and any future-added MAML files are handled automatically.
          Get-ChildItem 'Staging/en-US/*.xml' | Copy-Item -Destination $enUS
          $aboutFile = 'Staging/en-US/about_UiPathOrch.help.txt'
          if (Test-Path $aboutFile) { Copy-Item $aboutFile $enUS }

          "stage=$stage" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Probe signing secret
        id: sign_probe
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.CODE_SIGNING_PFX_BASE64 }}
        run: |
          $present = -not [string]::IsNullOrEmpty($env:PFX_B64)
          "present=$($present.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Sign module
        if: steps.sign_probe.outputs.present == 'true'
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.CODE_SIGNING_PFX_BASE64 }}
          PFX_PW:  ${{ secrets.CODE_SIGNING_PFX_PASSWORD }}
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:PFX_B64))
          $pw = ConvertTo-SecureString $env:PFX_PW -AsPlainText -Force
          $cert = Get-PfxCertificate -FilePath $pfx -Password $pw
          $stage = '${{ steps.stage.outputs.stage }}'
          # Sign ONLY the native binary. Script files (.psd1 / .psm1 / .ps1xml /
          # Functions/*.ps1) are left unsigned on purpose: Install-Module verifies
          # Authenticode signatures on script files but not on .dll, so a self-
          # signed script signature fails on any end-user PC where the cert is
          # not pre-trusted. WDAC / AppLocker only gate native binaries anyway.
          $files = @("$stage/UiPathOrch.dll")
          Set-AuthenticodeSignature -FilePath $files -Certificate $cert `
              -TimestampServer http://timestamp.digicert.com
          # Self-signed certs yield Status=UnknownError on machines where the cert is
          # not in the trust store (runners don't trust it). That's expected — the
          # signature itself is correct, only chain validation needs the cert installed
          # on the end-user machine. Verify thumbprint matches + reject tamper / missing.
          $expected = $cert.Thumbprint
          $bad = Get-AuthenticodeSignature $files | Where-Object {
            $_.SignerCertificate.Thumbprint -ne $expected -or
            $_.Status -notin @('Valid','UnknownError')
          }
          if ($bad) {
            $bad | Format-Table Status, StatusMessage, Path
            throw 'One or more signatures are missing, tampered, or signed by the wrong cert.'
          }

      - name: Publish to PSGallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Publish-Module -Path '${{ steps.stage.outputs.stage }}' -NuGetApiKey $env:PSGALLERY_API_KEY -Verbose

      - name: Extract release notes for this version
        id: notes
        shell: pwsh
        run: |
          $version = '${{ steps.ver.outputs.version }}'
          $lines = Get-Content CHANGELOG.md
          $inSection = $false
          $section = New-Object System.Collections.Generic.List[string]
          foreach ($line in $lines) {
            if ($line -match '^##\s+\[(\S+?)\]') {
              if ($matches[1] -eq $version) { $inSection = $true; continue }
              elseif ($inSection)            { break }
            }
            if ($inSection) { $section.Add($line) }
          }
          $body = ($section -join "`n").Trim()
          if ([string]::IsNullOrWhiteSpace($body)) {
            throw "No release notes section found for version $version in CHANGELOG.md"
          }
          $notesPath = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          Set-Content -Path $notesPath -Value $body -Encoding UTF8
          "notes_path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.ver.outputs.tag }}" --title "${{ steps.ver.outputs.tag }}" --notes-file "${{ steps.notes.outputs.notes_path }}"
